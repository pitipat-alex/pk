<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#FAFAF7" />
  <meta name="color-scheme" content="light dark">
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('pk_theme');
        if (saved && saved !== 'auto') document.documentElement.setAttribute('data-theme', saved);
      } catch (e) {}
    })();
  </script>
  <title>MMVD Patients · PK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@300;400;500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260501aw">

  <!-- Supabase JS v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"
          onerror="this.dataset.fallbackTried=1;
                   var s=document.createElement('script');
                   s.src='https://unpkg.com/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js';
                   document.head.appendChild(s);"></script>
  <script>
    (function () {
      var d = document.documentElement;
      try {
        var hasCachedSession = !!localStorage.getItem('sb-bxlyctricjayindvcfjo-auth-token');
        if (hasCachedSession) d.classList.add('checking');
        else d.classList.add('locked');
      } catch (e) { d.classList.add('locked'); }
    })();
  </script>

  <style>
    /* MMVD Admin Dashboard styles */
    .mmvd-search {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .mmvd-search input {
      flex: 1;
      min-width: 200px;
      padding: 10px 14px;
      background: var(--bg);
      border: 1.5px solid var(--rule);
      border-radius: 10px;
      font: 500 15px var(--font-sans);
      color: var(--ink);
      outline: none;
      font-family: inherit;
    }
    .mmvd-search input:focus { border-color: var(--red); background: white; }
    .mmvd-search .stats {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 0 4px;
      font: 500 13px var(--font-sans);
      color: var(--ink-mute);
    }
    .mmvd-search .stat-pill {
      background: var(--red-soft);
      color: var(--red);
      padding: 4px 10px;
      border-radius: 999px;
      font: 600 12px var(--font-mono);
    }

    .mmvd-pet-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 600px) {
      .mmvd-pet-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 900px) {
      .mmvd-pet-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .pet-card {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: all 200ms;
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-align: left;
      width: 100%;
      font-family: inherit;
    }
    .pet-card:hover {
      border-color: var(--red);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    }
    .pet-card .pet-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .pet-card .pet-emoji { font-size: 24px; }
    .pet-card .pet-info { flex: 1; min-width: 0; }
    .pet-card .pet-name {
      font: 700 16px var(--font-sans);
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pet-card .owner-name {
      font: 500 13px var(--font-sans);
      color: var(--ink-mute);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pet-card .last-visit {
      font: 500 11px var(--font-mono);
      color: var(--ink-mute);
      margin-top: 6px;
    }
    .pet-card .alert-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font: 600 11px var(--font-sans);
      margin-top: 4px;
    }
    .pet-card .alert-tag.green { background: var(--green-soft); color: #15803d; }
    .pet-card .alert-tag.yellow { background: var(--yellow-soft); color: #a16207; }
    .pet-card .alert-tag.orange { background: var(--orange-soft); color: #c2410c; }
    .pet-card .alert-tag.red { background: var(--red-soft); color: var(--red); }

    .pet-card .pet-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .pet-card .summary-pill {
      background: var(--bg);
      padding: 3px 8px;
      border-radius: 6px;
      font: 600 11px var(--font-mono);
      color: var(--ink);
    }
    .pet-card .summary-pill.warn {
      background: #fee2e2;
      color: var(--red);
    }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--ink-mute);
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 16px;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    /* Detail modal */
    .detail-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: flex-start;
      justify-content: center;
      z-index: 9000;
      padding: 20px;
      overflow-y: auto;
    }
    .detail-modal.show { display: flex; }
    .detail-content {
      background: var(--surface);
      border-radius: 20px;
      padding: 24px;
      max-width: 800px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      margin: auto;
    }
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding-bottom: 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--rule);
    }
    .detail-header h2 {
      font: 700 22px var(--font-sans);
      margin-bottom: 4px;
      color: var(--red);
    }
    .detail-owner {
      font: 500 14px var(--font-sans);
      color: var(--ink-mute);
    }
    .detail-close {
      background: var(--bg);
      border: 1px solid var(--rule);
      border-radius: 8px;
      padding: 6px 12px;
      font: 600 13px var(--font-sans);
      color: var(--ink);
      cursor: pointer;
      flex-shrink: 0;
      font-family: inherit;
    }
    .detail-close:hover { background: var(--red-soft); color: var(--red); }

    .detail-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .detail-actions button {
      padding: 8px 14px;
      background: var(--surface);
      border: 1.5px solid var(--rule);
      border-radius: 8px;
      font: 600 13px var(--font-sans);
      color: var(--ink);
      cursor: pointer;
      font-family: inherit;
    }
    .detail-actions button:hover { border-color: var(--red); color: var(--red); }
    .detail-actions button.danger:hover { background: var(--red-soft); }

    .detail-stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
      margin-bottom: 18px;
    }
    .detail-stat-card {
      background: var(--bg);
      padding: 12px;
      border-radius: 10px;
      text-align: center;
    }
    .detail-stat-card .num {
      font: 700 22px var(--font-mono);
      color: var(--ink);
    }
    .detail-stat-card .num.warn { color: var(--red); }
    .detail-stat-card .lbl {
      font: 500 11px var(--font-sans);
      color: var(--ink-mute);
    }

    .detail-chart {
      background: var(--bg);
      border: 1px solid var(--rule);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .detail-chart-title {
      font: 700 14px var(--font-sans);
      margin-bottom: 8px;
    }
    .detail-chart svg {
      width: 100%;
      height: 180px;
    }

    .detail-history {
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid var(--rule);
      border-radius: 12px;
      padding: 8px;
    }
    .detail-entry {
      padding: 10px 12px;
      border-bottom: 1px solid var(--rule);
    }
    .detail-entry:last-child { border-bottom: none; }
    .detail-entry-date {
      font: 700 13px var(--font-mono);
      color: var(--red);
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .entry-delete-btn {
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 150ms;
      opacity: 0.5;
      flex-shrink: 0;
    }
    .entry-delete-btn:hover {
      opacity: 1;
      background: var(--red-soft);
      border-color: var(--red);
    }
    .detail-entry-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 4px;
    }
    .detail-entry-stat {
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 6px;
      font: 600 11px var(--font-mono);
    }
    .detail-entry-stat.warn { background: #fee2e2; color: var(--red); }
    .detail-entry-note {
      font: 400 12px var(--font-sans);
      color: var(--ink-mute);
      margin-top: 4px;
      line-height: 1.4;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--ink);
      color: white;
      padding: 12px 20px;
      border-radius: 999px;
      font: 600 14px var(--font-sans);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      transition: transform 300ms;
      z-index: 9999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--green); }
    .toast.error { background: var(--red); }

    .loading-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--ink-mute);
    }
    .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid var(--rule);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="pride-bar"></div>

  <div class="blobs">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="blob b4"></div>
  </div>

  <div class="wrap">

    <header class="topbar">
      <a class="back-btn" href="clinic.html" aria-label="กลับงานคลินิก">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
        <span>งานคลินิก</span>
      </a>
      <div class="meta">
        <span class="online" aria-hidden="true"></span>
        <span id="clock">--:--</span>
      </div>
    </header>

    <section class="page-hero" style="--page-accent: var(--red);">
      <p class="page-eyebrow">CLINIC · MMVD FOLLOW-UP</p>
      <h1 class="page-title" style="color: var(--red);">MMVD Patients</h1>
      <p class="page-subtitle">ดูข้อมูล follow-up ของหมาโรคหัวใจที่เจ้าของส่งมา</p>
    </section>

    <main>
      <!-- Search bar -->
      <div class="mmvd-search">
        <input type="text" id="searchInput" placeholder="🔍 ค้นหา ชื่อหมา · ชื่อเจ้าของ · เบอร์โทร" />
        <div class="stats">
          <span>ทั้งหมด:</span>
          <span class="stat-pill" id="totalCount">—</span>
        </div>
      </div>

      <!-- Pet grid -->
      <div id="petContainer">
        <div class="loading-state">
          <div class="spinner"></div>
          <div>กำลังโหลดรายการ...</div>
        </div>
      </div>
    </main>

    <footer class="foot">
      <div class="row">
        <span>© alex · 2026</span>
        <span class="with-pride">
          <span>made with pride</span>
          <span class="pride-mini" aria-hidden="true"></span>
        </span>
      </div>
    </footer>

  </div>

  <!-- Detail Modal -->
  <div class="detail-modal" id="detailModal">
    <div class="detail-content" id="detailContent">
      <!-- Filled dynamically -->
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="auth.js?v=20260501aw"></script>
  <script src="mmvd-admin.js?v=20260501aw"></script>
</body>
</html>
